<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Clash 21 - Main Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-core: #07090d;
      --bg-edge: #0f0a1f;
      --bg-accent: #09202a;
      --text-main: #f7f8ff;
      --text-sub: #adb1c8;
      --text-muted: #4c5160;
      --neon: #d54bff;
      --neon-soft: rgba(213, 75, 255, 0.45);
      --primary-a: #b93dff;
      --primary-b: #7020f5;
      --btn-dark: rgba(18, 20, 28, 0.58);
      --border-glow: rgba(192, 86, 255, 0.88);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(circle at 50% 30%, #121521 0%, var(--bg-core) 45%, var(--bg-edge) 78%, var(--bg-accent) 100%);
      color: var(--text-main);
    }

    .menu-screen {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      isolation: isolate;
    }

    .cards-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: -1;
    }

    .card-shape {
      position: absolute;
      width: 88px;
      height: 122px;
      border-radius: 12px;
      background: linear-gradient(150deg, rgba(197, 201, 255, 0.16), rgba(123, 134, 188, 0.04));
      border: 1px solid rgba(185, 193, 255, 0.18);
      filter: blur(2px);
      opacity: 0.17;
      transform: rotate(var(--r));
      box-shadow: 0 0 20px rgba(160, 102, 255, 0.14);
      animation: float 9s ease-in-out infinite;
      animation-delay: var(--d);
    }

    .card-shape::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 8px;
      border: 1px solid rgba(219, 226, 255, 0.15);
    }

    .card-1 { top: 8%; left: 13%; --r: -15deg; --d: -2s; }
    .card-2 { top: 22%; right: 12%; --r: 14deg; --d: -5s; }
    .card-3 { bottom: 18%; left: 18%; --r: 8deg; --d: -1.2s; }
    .card-4 { bottom: 10%; right: 18%; --r: -11deg; --d: -4s; }
    .card-5 { top: 43%; left: 5%; --r: -22deg; --d: -6s; opacity: 0.12; }
    .card-6 { top: 52%; right: 6%; --r: 20deg; --d: -3.5s; opacity: 0.12; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(var(--r)); }
      50% { transform: translateY(-10px) rotate(calc(var(--r) + 2deg)); }
    }

    .panel {
      width: min(90vw, 580px);
      padding: 30px 28px 20px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(20, 22, 33, 0.4), rgba(13, 14, 22, 0.2));
      border: 1px solid rgba(170, 178, 235, 0.12);
      backdrop-filter: blur(3px);
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.4);
    }

    .title-wrap {
      margin-bottom: 22px;
    }

    .title-line {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(2rem, 6vw, 3.15rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-main);
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.3),
        0 0 18px rgba(213, 75, 255, 0.75),
        0 0 42px rgba(213, 75, 255, 0.45);
    }

    .title-21 {
      margin-top: 4px;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(2.5rem, 9vw, 4rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.08em;
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.34),
        0 0 24px var(--neon-soft);
    }

    .sparkle {
      width: 15px;
      height: 15px;
      color: #f6dbff;
      filter: drop-shadow(0 0 6px var(--neon));
      opacity: 0.95;
      flex: 0 0 auto;
    }

    .subtitle {
      margin: 12px auto 24px;
      max-width: 540px;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 0.73rem;
      font-weight: 500;
    }

    .button-stack {
      display: grid;
      gap: 14px;
      justify-content: center;
      margin: 0 auto;
      width: min(100%, 360px);
    }

    .menu-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      outline: none;
    }

    .menu-btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(214, 95, 255, 0.3);
    }

    .menu-btn:hover {
      transform: translateY(-1px) scale(1.02);
    }

    .menu-btn.primary {
      background: linear-gradient(115deg, var(--primary-a) 0%, #8d35ff 40%, var(--primary-b) 100%);
      box-shadow:
        0 8px 18px rgba(95, 44, 189, 0.4),
        0 0 20px rgba(192, 86, 255, 0.45);
    }

    .menu-btn.primary:hover {
      box-shadow:
        0 12px 24px rgba(95, 44, 189, 0.5),
        0 0 32px rgba(201, 111, 255, 0.55);
    }

    .menu-btn.secondary {
      background: var(--btn-dark);
      border: 1.2px solid var(--border-glow);
      box-shadow: 0 0 15px rgba(177, 74, 247, 0.16) inset;
    }

    .menu-btn.secondary:hover {
      box-shadow:
        0 0 20px rgba(201, 108, 255, 0.34),
        0 0 12px rgba(177, 74, 247, 0.2) inset;
      border-color: #d77fff;
    }

    .footer-note {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      user-select: none;
    }
  </style>
</head>
<body>
  <main class="menu-screen">
    <div class="cards-bg" aria-hidden="true">
      <span class="card-shape card-1"></span>
      <span class="card-shape card-2"></span>
      <span class="card-shape card-3"></span>
      <span class="card-shape card-4"></span>
      <span class="card-shape card-5"></span>
      <span class="card-shape card-6"></span>
    </div>

    <section class="panel">
      <header class="title-wrap">
        <div class="title-line">
          <svg class="sparkle" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 1l2.35 8.65L23 12l-8.65 2.35L12 23l-2.35-8.65L1 12l8.65-2.35L12 1z"></path>
          </svg>
          <span>CARD CLASH</span>
          <svg class="sparkle" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 1l2.35 8.65L23 12l-8.65 2.35L12 23l-2.35-8.65L1 12l8.65-2.35L12 1z"></path>
          </svg>
        </div>
        <div class="title-21">21</div>
      </header>

      <p class="subtitle">MASTER THE ODDS. DOMINATE THE TABLE.</p>

      <div class="button-stack">
        <button class="menu-btn primary" type="button">Play Now</button>
        <button class="menu-btn secondary" type="button">Create Room</button>
        <button class="menu-btn secondary" type="button">Join Room</button>
      </div>
    </section>
  </main>

  <footer class="footer-note">A multiplayer strategy card game</footer>
</body>
</html>
